<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Subtle NOVA HUD grid background">
  <!-- Transparent low-contrast HUD texture for GitHub dark mode -->
  <defs>
    <pattern id="hex-grid" width="96" height="84" patternUnits="userSpaceOnUse">
      <path d="M24 1h48l24 41-24 41H24L0 42Z M72 1 96 42" fill="none" stroke="#00E5FF" stroke-opacity=".045" stroke-width="1"/>
    </pattern>
    <filter id="scan-glow" x="-30%" y="-300%" width="160%" height="700%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Hexagonal structure, intentionally subdued and background-transparent. -->
  <rect width="1600" height="900" fill="url(#hex-grid)"/>

  <!-- Sparse corner brackets establish the interface frame. -->
  <g fill="none" stroke-linecap="round" stroke-width="1.5">
    <path d="M56 144V56h88M1456 56h88v88M56 756v88h88M1544 756v88h-88" stroke="#7C3AED" stroke-opacity=".24"/>
    <path d="M76 112V76h36M1488 76h36v36M76 788v36h36M1524 788v36h-36" stroke="#00E5FF" stroke-opacity=".28"/>
  </g>

  <!-- Minimal circuit traces restricted to perimeter areas. -->
  <g fill="none" stroke="#00E5FF" stroke-opacity=".13" stroke-linecap="round">
    <path d="M0 238h146l26 26h118M0 677h104l31-31h131M1600 238h-146l-26 26h-118M1600 677h-104l-31-31h-131"/>
    <path d="M330 0v58l22 22h113M1270 0v58l-22 22h-113M330 900v-58l22-22h113M1270 900v-58l-22-22h-113" stroke="#7C3AED" stroke-opacity=".12"/>
  </g>

  <!-- Tiny low-luminance telemetry points. -->
  <g fill="#00E5FF" opacity=".34"><circle cx="172" cy="264" r="2"/><circle cx="135" cy="646" r="2"/><circle cx="1428" cy="264" r="2"/><circle cx="1465" cy="646" r="2"/><circle cx="352" cy="80" r="1.5"/><circle cx="1248" cy="820" r="1.5"/></g>
  <g fill="#7C3AED" opacity=".34"><circle cx="352" cy="820" r="1.5"/><circle cx="1248" cy="80" r="1.5"/></g>

  <!-- Single slow scanning signal; kept faint to avoid distracting from page content. -->
  <path d="M160 0h1280" stroke="#00E5FF" stroke-opacity=".16" stroke-width="1" filter="url(#scan-glow)">
    <animateTransform attributeName="transform" type="translate" values="0 -2;0 904" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;.18;.18;0" dur="12s" repeatCount="indefinite"/>
  </path>
</svg>
