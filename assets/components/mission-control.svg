<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" width="1600" height="600" role="img" aria-labelledby="title desc">
  <!-- NOVA Mission Control: active project operations dashboard -->
  <title id="title">Mission Control</title>
  <desc id="desc">NOVA AI dashboard for NeuroCity, PrepWise, and CreditWise.</desc>
  <defs>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#00E5FF" stop-opacity=".7"/><stop offset=".52" stop-color="#546A84" stop-opacity=".26"/><stop offset="1" stop-color="#7C3AED" stop-opacity=".7"/></linearGradient>
    <filter id="glow" x="-90%" y="-120%" width="280%" height="340%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow" x="-12%" y="-16%" width="124%" height="132%"><feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity=".65"/></filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M32 0H0V32" fill="none" stroke="#00E5FF" stroke-opacity=".035"/></pattern>
  </defs>

  <!-- Transparent glass console -->
  <g font-family="Inter,Segoe UI,Arial,sans-serif" filter="url(#shadow)">
    <rect x="40" y="40" width="1520" height="520" rx="24" fill="#0D1522" fill-opacity=".9" stroke="url(#edge)" stroke-width="1.25"/>
    <rect x="41" y="41" width="1518" height="518" rx="23" fill="url(#grid)"/>
    <path d="M41 146H1559" stroke="#50657D" stroke-opacity=".54"/>

    <!-- Command header -->
    <g id="mission-header">
      <g transform="translate(80 76)" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect width="48" height="48" rx="16" fill="#102C39" stroke="#00E5FF" stroke-opacity=".48"/><path d="m13 32 14-10 9 9 11-15M13 16l5 5M31 13l-4 5" stroke="#00E5FF" stroke-width="2.5" filter="url(#glow)"/><circle cx="36" cy="16" r="3" fill="#7C3AED" stroke="none"/></g>
      <text x="148" y="93" fill="#7F91AA" font-size="10" font-weight="700" letter-spacing="2.2">NOVA // PROJECT OPERATIONS</text>
      <text x="148" y="120" fill="#EFF8FF" font-size="26" font-weight="700" letter-spacing=".8">MISSION CONTROL</text>
      <g transform="translate(1308 79)"><rect width="192" height="40" rx="16" fill="#102C35" stroke="#00E5FF" stroke-opacity=".4"/><circle cx="22" cy="20" r="5" fill="#00FFA3" filter="url(#glow)"/><text x="38" y="24" fill="#B9FFE2" font-size="11" font-weight="700" letter-spacing="1.1">3 SYSTEMS ONLINE</text></g>
    </g>

    <!-- NeuroCity -->
    <g id="neurocity" transform="translate(80 178)">
      <rect width="448" height="326" rx="20" fill="#10202E" fill-opacity=".76" stroke="#00E5FF" stroke-opacity=".36"/>
      <g transform="translate(28 28)" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect width="72" height="72" rx="16" fill="#102E3B" stroke="#00E5FF" stroke-opacity=".5"/><path d="M18 54V35h11v19m5 0V21h11v33m5 0V30h11v24M14 57h44M24 35l15-14 15 9" stroke="#00E5FF" stroke-width="2.5" filter="url(#glow)"/><circle cx="39" cy="21" r="3" fill="#7C3AED" stroke="none"/></g>
      <text x="120" y="57" fill="#E8F8FF" font-size="25" font-weight="700">NeuroCity</text>
      <text x="120" y="80" fill="#65EFFF" font-size="10" font-weight="700" letter-spacing="1.6">AI-001 // URBAN INTELLIGENCE</text>
      <path d="M28 126H420" stroke="#40556E" stroke-opacity=".64"/>
      <text x="28" y="160" fill="#7F91AA" font-size="10" font-weight="700" letter-spacing="1.7">STATUS</text><circle cx="32" cy="187" r="5" fill="#00FFA3" filter="url(#glow)"/><text x="47" y="192" fill="#B9FFE2" font-size="14" font-weight="700" letter-spacing="1">ONLINE</text>
      <text x="28" y="235" fill="#7F91AA" font-size="10" font-weight="700" letter-spacing="1.7">MISSION</text><text x="28" y="262" fill="#C5D4E5" font-size="16">Artificial Intelligence</text>
      <path d="M28 290h392" stroke="#263C53" stroke-width="5" stroke-linecap="round"/><path d="M28 290h280" stroke="#00E5FF" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
    </g>

    <!-- PrepWise -->
    <g id="prepwise" transform="translate(576 178)">
      <rect width="448" height="326" rx="20" fill="#1C1A30" fill-opacity=".76" stroke="#7C3AED" stroke-opacity=".45"/>
      <g transform="translate(28 28)" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect width="72" height="72" rx="16" fill="#261D3C" stroke="#7C3AED" stroke-opacity=".6"/><path d="m14 34 22-12 22 12-22 12ZM22 39v10c8 6 20 6 28 0V39M58 34v16" stroke="#C4B5FD" stroke-width="2.5" filter="url(#glow)"/><circle cx="58" cy="52" r="3" fill="#00FFA3" stroke="none"/></g>
      <text x="120" y="57" fill="#F3F0FF" font-size="25" font-weight="700">PrepWise</text>
      <text x="120" y="80" fill="#C4B5FD" font-size="10" font-weight="700" letter-spacing="1.6">EDU-002 // LEARNING SYSTEMS</text>
      <path d="M28 126H420" stroke="#51466F" stroke-opacity=".64"/>
      <text x="28" y="160" fill="#958AAE" font-size="10" font-weight="700" letter-spacing="1.7">STATUS</text><circle cx="32" cy="187" r="5" fill="#00FFA3" filter="url(#glow)"/><text x="47" y="192" fill="#B9FFE2" font-size="14" font-weight="700" letter-spacing="1">ONLINE</text>
      <text x="28" y="235" fill="#958AAE" font-size="10" font-weight="700" letter-spacing="1.7">MISSION</text><text x="28" y="262" fill="#D4CDEE" font-size="16">Education Platform</text>
      <path d="M28 290h392" stroke="#352E4C" stroke-width="5" stroke-linecap="round"/><path d="M28 290h255" stroke="#7C3AED" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
    </g>

    <!-- CreditWise -->
    <g id="creditwise" transform="translate(1072 178)">
      <rect width="448" height="326" rx="20" fill="#202116" fill-opacity=".76" stroke="#F6C453" stroke-opacity=".42"/>
      <g transform="translate(28 28)" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect width="72" height="72" rx="16" fill="#312A16" stroke="#F6C453" stroke-opacity=".62"/><path d="M36 15 53 22v13c0 12-8 20-17 24-9-4-17-12-17-24V22Z" stroke="#F6C453" stroke-width="2.5" filter="url(#glow)"/><path d="M39 28c-2-3-9-2-9 2 0 6 13 3 13 10 0 4-7 5-10 2m3-18v23" stroke="#00E5FF" stroke-width="2"/></g>
      <text x="120" y="57" fill="#FFF8E7" font-size="25" font-weight="700">CreditWise</text>
      <text x="120" y="80" fill="#FFE09A" font-size="10" font-weight="700" letter-spacing="1.6">ML-003 // CREDIT OPERATIONS</text>
      <path d="M28 126H420" stroke="#665B36" stroke-opacity=".64"/>
      <text x="28" y="160" fill="#AA9D75" font-size="10" font-weight="700" letter-spacing="1.7">STATUS</text><circle cx="32" cy="187" r="5" fill="#00FFA3" filter="url(#glow)"/><text x="47" y="192" fill="#B9FFE2" font-size="14" font-weight="700" letter-spacing="1">ONLINE</text>
      <text x="28" y="235" fill="#AA9D75" font-size="10" font-weight="700" letter-spacing="1.7">MISSION</text><text x="28" y="262" fill="#E8D9AA" font-size="16">Financial Software</text>
      <path d="M28 290h392" stroke="#493E22" stroke-width="5" stroke-linecap="round"/><path d="M28 290h305" stroke="#F6C453" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
    </g>

    <g fill="none" stroke-linecap="round"><path d="M40 210h22l18 18M40 474h22l18-18M1560 210h-22l-18 18M1560 474h-22l-18-18" stroke="#7C3AED" stroke-opacity=".44" stroke-width="2"/><path d="M712 530h176M888 530h176" stroke="#00E5FF" stroke-opacity=".42"/></g>
  </g>
</svg>
