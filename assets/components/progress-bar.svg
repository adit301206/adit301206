<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 74" role="img" aria-label="NOVA progress bar">
  <!-- NOVA component: progress bar set to 68 percent -->
  <defs><filter id="nova-glow" x="-20%" y="-250%" width="140%" height="600%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><filter id="nova-shadow" x="-10%" y="-90%" width="120%" height="280%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#020617" flood-opacity=".55"/></filter></defs>
  <g font-family="Inter,Segoe UI,Arial,sans-serif" filter="url(#nova-shadow)"><text x="16" y="21" fill="#8FA1BA" font-size="10" font-weight="700" letter-spacing="1.7">{{LABEL}}</text><text x="684" y="21" text-anchor="end" fill="#65EFFF" font-size="11" font-weight="700">68%</text><rect x="16" y="38" width="668" height="16" rx="8" fill="#1B2A3F" stroke="#40536D" stroke-opacity=".62"/><rect x="16" y="38" width="454" height="16" rx="8" fill="#00E5FF" fill-opacity=".78" filter="url(#nova-glow)"/><rect x="430" y="38" width="40" height="16" rx="8" fill="#7C3AED"><animate attributeName="x" values="405;430;405" dur="2.8s" repeatCount="indefinite"/></rect></g>
</svg>
