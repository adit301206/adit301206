<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" role="img" aria-label="NOVA terminal panel template">
  <!-- NOVA component: terminal panel -->
  <defs><filter id="nova-glow" x="-70%" y="-130%" width="240%" height="360%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><filter id="nova-shadow" x="-20%" y="-25%" width="140%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#020617" flood-opacity=".55"/></filter><pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M24 0H0V24" fill="none" stroke="#00E5FF" stroke-opacity=".035"/></pattern></defs>
  <g font-family="Inter,Segoe UI,Arial,sans-serif" filter="url(#nova-shadow)"><rect x="8" y="8" width="884" height="384" rx="16" fill="#111C2B" fill-opacity=".9" stroke="#00E5FF" stroke-opacity=".42"/><rect x="9" y="9" width="882" height="56" rx="16" fill="#17263A" fill-opacity=".74"/><path d="M9 65h882" stroke="#5B6D86" stroke-opacity=".5"/><circle cx="34" cy="36" r="6" fill="#FF5F57"/><circle cx="56" cy="36" r="6" fill="#F6C453"/><circle cx="78" cy="36" r="6" fill="#00FFA3"/><text x="112" y="41" fill="#D8E6F5" font-size="12" font-weight="700" letter-spacing="1.8">NOVA TERMINAL</text><text x="754" y="41" fill="#7F91AA" font-size="10" font-weight="700" letter-spacing="1.2">SECURE</text><rect x="32" y="89" width="836" height="271" rx="16" fill="url(#grid)" stroke="#40536D" stroke-opacity=".52"/><text x="56" y="124" fill="#00FFA3" font-size="14" font-weight="700">&gt;</text><text x="76" y="124" fill="#9FB1C7" font-size="13">{{CONTENT}}</text><rect x="56" y="145" width="260" height="7" rx="3.5" fill="#32465E"/><rect x="56" y="165" width="384" height="7" rx="3.5" fill="#273A50"/><rect x="56" y="185" width="212" height="7" rx="3.5" fill="#32465E"/><rect x="56" y="328" width="7" height="14" rx="1" fill="#00E5FF" filter="url(#nova-glow)"><animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></rect></g>
</svg>
