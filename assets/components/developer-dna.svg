<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-labelledby="title desc">
  <!-- NOVA Developer DNA: animated competency dashboard -->
  <title id="title">Developer DNA</title>
  <desc id="desc">NOVA AI dashboard showing eight engineering competency gauges.</desc>
  <defs>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#00E5FF" stop-opacity=".7"/><stop offset=".5" stop-color="#536982" stop-opacity=".25"/><stop offset="1" stop-color="#7C3AED" stop-opacity=".7"/></linearGradient>
    <filter id="glow" x="-90%" y="-90%" width="280%" height="280%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow" x="-12%" y="-14%" width="124%" height="128%"><feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity=".68"/></filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M36 0H0V36" fill="none" stroke="#00E5FF" stroke-opacity=".035"/></pattern>
  </defs>

  <!-- Glass console shell over a transparent canvas. -->
  <g font-family="Inter,Segoe UI,Arial,sans-serif" filter="url(#shadow)">
    <rect x="48" y="42" width="1504" height="816" rx="24" fill="#0D1522" fill-opacity=".9" stroke="url(#frame)" stroke-width="1.25"/>
    <rect x="49" y="43" width="1502" height="814" rx="23" fill="url(#grid)"/>
    <path d="M49 152H1551" stroke="#52657D" stroke-opacity=".54"/>

    <!-- Header -->
    <g id="header">
      <g transform="translate(88 79)" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect width="48" height="48" rx="16" fill="#102A37" stroke="#00E5FF" stroke-opacity=".46"/><path d="M24 9 39 18v18L24 45 9 36V18Z" stroke="#00E5FF" stroke-width="2.5" filter="url(#glow)"/><path d="M16 33V19l16 16V19" stroke="#00E5FF" stroke-width="2.5"/><circle cx="24" cy="9" r="2.5" fill="#7C3AED" stroke="none"/></g>
      <text x="154" y="100" fill="#7F91AA" font-size="10" font-weight="700" letter-spacing="2.2">NOVA // ENGINEERING INTELLIGENCE</text>
      <text x="154" y="128" fill="#EFF8FF" font-size="25" font-weight="700" letter-spacing=".8">Developer DNA</text>
      <g transform="translate(1310 82)"><rect width="194" height="42" rx="16" fill="#102C35" stroke="#00E5FF" stroke-opacity=".4"/><circle cx="22" cy="21" r="5" fill="#00FFA3" filter="url(#glow)"/><text x="38" y="25" fill="#B9FFE2" font-size="11" font-weight="700" letter-spacing="1.1">PROFILE ACTIVE</text></g>
    </g>

    <!-- Gauge legend -->
    <g transform="translate(88 188)" font-size="10" font-weight="700" letter-spacing="1.5"><text fill="#7F91AA">CAPABILITY SIGNAL MAP</text><circle cx="198" cy="-3" r="4" fill="#00E5FF" filter="url(#glow)"/><text x="210" fill="#91A3BA">CORE</text><circle cx="274" cy="-3" r="4" fill="#7C3AED" filter="url(#glow)"/><text x="286" fill="#91A3BA">GROWTH</text><circle cx="372" cy="-3" r="4" fill="#00FFA3" filter="url(#glow)"/><text x="384" fill="#91A3BA">ACTIVE</text></g>

    <!-- Gauge 1: Problem Solving -->
    <g id="problem-solving" transform="translate(260 325)"><circle r="108" fill="#111C2B" fill-opacity=".74" stroke="#41546E" stroke-opacity=".56"/><circle r="76" fill="none" stroke="#263A50" stroke-width="12"/><circle r="76" fill="none" stroke="#00E5FF" stroke-width="12" stroke-linecap="round" stroke-dasharray="430 478" transform="rotate(-90)" filter="url(#glow)"><animate attributeName="stroke-dasharray" values="0 478;430 478" dur="1.4s" fill="freeze"/></circle><circle cy="-76" r="4" fill="#7C3AED" filter="url(#glow)"/><text y="-12" text-anchor="middle" fill="#F0FAFF" font-size="27" font-weight="700">90%</text><text y="14" text-anchor="middle" fill="#8FA1BA" font-size="10" font-weight="700" letter-spacing="1.3">PROBLEM</text><text y="28" text-anchor="middle" fill="#8FA1BA" font-size="10" font-weight="700" letter-spacing="1.3">SOLVING</text></g>

    <!-- Gauge 2: Backend Engineering -->
    <g id="backend-engineering" transform="translate(620 325)"><circle r="108" fill="#111C2B" fill-opacity=".74" stroke="#41546E" stroke-opacity=".56"/><circle r="76" fill="none" stroke="#263A50" stroke-width="12"/><circle r="76" fill="none" stroke="#00E5FF" stroke-width="12" stroke-linecap="round" stroke-dasharray="440 478" transform="rotate(-90)" filter="url(#glow)"><animate attributeName="stroke-dasharray" values="0 478;440 478" dur="1.5s" fill="freeze"/></circle><circle cy="-76" r="4" fill="#00FFA3" filter="url(#glow)"/><text y="-12" text-anchor="middle" fill="#F0FAFF" font-size="27" font-weight="700">92%</text><text y="14" text-anchor="middle" fill="#8FA1BA" font-size="10" font-weight="700" letter-spacing="1.3">BACKEND</text><text y="28" text-anchor="middle" fill="#8FA1BA" font-size="10" font-weight="700" letter-spacing="1.3">ENGINEERING</text></g>

    <!-- Gauge 3: Artificial Intelligence -->
    <g id="artificial-intelligence" transform="translate(980 325)"><circle r="108" fill="#111C2B" fill-opacity=".74" stroke="#41546E" stroke-opacity=".56"/><circle r="76" fill="none" stroke="#263A50" stroke-width="12"/><circle r="76" fill="none" stroke="#7C3AED" stroke-width="12" stroke-linecap="round" stroke-dasharray="402 478" transform="rotate(-90)" filter="url(#glow)"><animate attributeName="stroke-dasharray" values="0 478;402 478" dur="1.6s" fill="freeze"/></circle><circle cy="-76" r="4" fill="#00E5FF" filter="url(#glow)"/><text y="-12" text-anchor="middle" fill="#F5F1FF" font-size="27" font-weight="700">84%</text><text y="14" text-anchor="middle" fill="#A89FC5" font-size="10" font-weight="700" letter-spacing="1.1">ARTIFICIAL</text><text y="28" text-anchor="middle" fill="#A89FC5" font-size="10" font-weight="700" letter-spacing="1.1">INTELLIGENCE</text></g>

    <!-- Gauge 4: Data Science -->
    <g id="data-science" transform="translate(1340 325)"><circle r="108" fill="#111C2B" fill-opacity=".74" stroke="#41546E" stroke-opacity=".56"/><circle r="76" fill="none" stroke="#263A50" stroke-width="12"/><circle r="76" fill="none" stroke="#7C3AED" stroke-width="12" stroke-linecap="round" stroke-dasharray="373 478" transform="rotate(-90)" filter="url(#glow)"><animate attributeName="stroke-dasharray" values="0 478;373 478" dur="1.7s" fill="freeze"/></circle><circle cy="-76" r="4" fill="#00FFA3" filter="url(#glow)"/><text y="-12" text-anchor="middle" fill="#F5F1FF" font-size="27" font-weight="700">78%</text><text y="14" text-anchor="middle" fill="#A89FC5" font-size="10" font-weight="700" letter-spacing="1.3">DATA</text><text y="28" text-anchor="middle" fill="#A89FC5" font-size="10" font-weight="700" letter-spacing="1.3">SCIENCE</text></g>

    <!-- Gauge 5: Open Source -->
    <g id="open-source" transform="translate(260 642)"><circle r="108" fill="#111C2B" fill-opacity=".74" stroke="#41546E" stroke-opacity=".56"/><circle r="76" fill="none" stroke="#263A50" stroke-width="12"/><circle r="76" fill="none" stroke="#00FFA3" stroke-width="12" stroke-linecap="round" stroke-dasharray="383 478" transform="rotate(-90)" filter="url(#glow)"><animate attributeName="stroke-dasharray" values="0 478;383 478" dur="1.8s" fill="freeze"/></circle><circle cy="-76" r="4" fill="#00E5FF" filter="url(#glow)"/><text y="-12" text-anchor="middle" fill="#E9FFF6" font-size="27" font-weight="700">80%</text><text y="14" text-anchor="middle" fill="#96C6B1" font-size="10" font-weight="700" letter-spacing="1.3">OPEN</text><text y="28" text-anchor="middle" fill="#96C6B1" font-size="10" font-weight="700" letter-spacing="1.3">SOURCE</text></g>

    <!-- Gauge 6: Leadership -->
    <g id="leadership" transform="translate(620 642)"><circle r="108" fill="#111C2B" fill-opacity=".74" stroke="#41546E" stroke-opacity=".56"/><circle r="76" fill="none" stroke="#263A50" stroke-width="12"/><circle r="76" fill="none" stroke="#00FFA3" stroke-width="12" stroke-linecap="round" stroke-dasharray="344 478" transform="rotate(-90)" filter="url(#glow)"><animate attributeName="stroke-dasharray" values="0 478;344 478" dur="1.9s" fill="freeze"/></circle><circle cy="-76" r="4" fill="#7C3AED" filter="url(#glow)"/><text y="-12" text-anchor="middle" fill="#E9FFF6" font-size="27" font-weight="700">72%</text><text y="21" text-anchor="middle" fill="#96C6B1" font-size="10" font-weight="700" letter-spacing="1.3">LEADERSHIP</text></g>

    <!-- Gauge 7: Innovation -->
    <g id="innovation" transform="translate(980 642)"><circle r="108" fill="#111C2B" fill-opacity=".74" stroke="#41546E" stroke-opacity=".56"/><circle r="76" fill="none" stroke="#263A50" stroke-width="12"/><circle r="76" fill="none" stroke="#00E5FF" stroke-width="12" stroke-linecap="round" stroke-dasharray="421 478" transform="rotate(-90)" filter="url(#glow)"><animate attributeName="stroke-dasharray" values="0 478;421 478" dur="2s" fill="freeze"/></circle><circle cy="-76" r="4" fill="#7C3AED" filter="url(#glow)"/><text y="-12" text-anchor="middle" fill="#F0FAFF" font-size="27" font-weight="700">88%</text><text y="21" text-anchor="middle" fill="#8FA1BA" font-size="10" font-weight="700" letter-spacing="1.3">INNOVATION</text></g>

    <!-- Gauge 8: Learning -->
    <g id="learning" transform="translate(1340 642)"><circle r="108" fill="#111C2B" fill-opacity=".74" stroke="#41546E" stroke-opacity=".56"/><circle r="76" fill="none" stroke="#263A50" stroke-width="12"/><circle r="76" fill="none" stroke="#00E5FF" stroke-width="12" stroke-linecap="round" stroke-dasharray="454 478" transform="rotate(-90)" filter="url(#glow)"><animate attributeName="stroke-dasharray" values="0 478;454 478" dur="2.1s" fill="freeze"/></circle><circle cy="-76" r="4" fill="#00FFA3" filter="url(#glow)"/><text y="-12" text-anchor="middle" fill="#F0FAFF" font-size="27" font-weight="700">95%</text><text y="21" text-anchor="middle" fill="#8FA1BA" font-size="10" font-weight="700" letter-spacing="1.3">LEARNING</text></g>

    <!-- Minimal perimeter decoration and scan line. -->
    <g fill="none" stroke-linecap="round"><path d="M48 238h24l18 18M48 774h24l18-18M1552 238h-24l-18 18M1552 774h-24l-18-18" stroke="#7C3AED" stroke-opacity=".44" stroke-width="2"/><path d="M136 812h180M1284 812h180" stroke="#00E5FF" stroke-opacity=".36"/></g>
    <path d="M112 0h1376" stroke="#00E5FF" stroke-opacity=".24" stroke-width="2" filter="url(#glow)"><animateTransform attributeName="transform" type="translate" values="0 0;0 900" dur="11s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;.45;.45;0" dur="11s" repeatCount="indefinite"/></path>
  </g>
</svg>
