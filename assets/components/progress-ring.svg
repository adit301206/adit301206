<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-label="NOVA progress ring">
  <!-- NOVA component: progress ring set to 68 percent -->
  <defs><filter id="nova-glow" x="-70%" y="-70%" width="240%" height="240%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><filter id="nova-shadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#020617" flood-opacity=".55"/></filter></defs>
  <g font-family="Inter,Segoe UI,Arial,sans-serif" filter="url(#nova-shadow)"><circle cx="90" cy="90" r="78" fill="#111C2B" fill-opacity=".86"/><circle cx="90" cy="90" r="58" fill="none" stroke="#263A50" stroke-width="10"/><circle cx="90" cy="90" r="58" fill="none" stroke="#00E5FF" stroke-width="10" stroke-linecap="round" stroke-dasharray="248 365" transform="rotate(-90 90 90)" filter="url(#nova-glow)"/><circle cx="90" cy="32" r="3" fill="#7C3AED"/><text x="90" y="91" text-anchor="middle" fill="#EFF8FF" font-size="30" font-weight="700">68%</text><text x="90" y="113" text-anchor="middle" fill="#8FA1BA" font-size="10" font-weight="700" letter-spacing="1.4">PROGRESS</text></g>
</svg>
